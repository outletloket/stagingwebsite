<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Entire hammer group rotated -30° around center -->
  <g transform="rotate(-30 50 50)">
    <!-- Hammer head (white outline) -->
    <rect x="20" y="20" width="40" height="22" rx="4" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Yellow face accent on head -->
    <rect x="20" y="20" width="14" height="22" rx="2" fill="#F5C842" fill-opacity="0.85"/>
    <!-- Handle -->
    <rect x="46" y="42" width="8" height="42" rx="4" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
