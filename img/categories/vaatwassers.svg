<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Box outline -->
  <rect x="14" y="14" width="72" height="72" rx="5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Door hinge panel line -->
  <line x1="14" y1="80" x2="86" y2="80" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Spray arm horizontal (yellow) -->
  <line x1="24" y1="50" x2="76" y2="50" stroke="#F5C842" stroke-width="3" stroke-linecap="round"/>
  <!-- Spray arm vertical (yellow) -->
  <line x1="50" y1="26" x2="50" y2="74" stroke="#F5C842" stroke-width="3" stroke-linecap="round"/>
  <!-- Spray arm center hub (yellow) -->
  <circle cx="50" cy="50" r="4" fill="#F5C842"/>
  <!-- Plates as vertical lines -->
  <line x1="26" y1="28" x2="26" y2="72" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="34" y1="28" x2="34" y2="72" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="28" x2="42" y2="72" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="58" y1="28" x2="58" y2="72" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="66" y1="28" x2="66" y2="72" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
</svg>
