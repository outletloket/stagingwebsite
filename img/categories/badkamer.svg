  <!-- Shower head face accent (yellow) -->
  <ellipse cx="44" cy="42" rx="11" ry="6" stroke="#F5C842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(-20 44 42)"/>
  <!-- Water drops row 1 -->
  <line x1="34" y1="54" x2="34" y2="62" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="54" x2="40" y2="62" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="54" x2="46" y2="62" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="54" x2="52" y2="62" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="58" y1="54" x2="58" y2="62" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="54" x2="64" y2="62" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Water drops row 2 -->
  <line x1="37" y1="67" x2="37" y2="74" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="46" y1="67" x2="46" y2="74" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="67" x2="55" y2="74" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
