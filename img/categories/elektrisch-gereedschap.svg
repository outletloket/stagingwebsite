<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Drill body (main cylinder) -->
  <rect x="16" y="22" width="56" height="28" rx="8" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Chuck (front cone/triangle) -->
  <path d="M72,28 L86,36 L72,44 Z" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Drill bit -->
  <line x1="86" y1="36" x2="96" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Pistol grip -->
  <rect x="30" y="50" width="20" height="30" rx="8" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Trigger (yellow fill) -->
  <rect x="42" y="58" width="8" height="14" rx="3" fill="#F5C842"/>
  <!-- Battery pack (yellow stroke) -->
  <rect x="24" y="74" width="28" height="10" rx="4" stroke="#F5C842" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
