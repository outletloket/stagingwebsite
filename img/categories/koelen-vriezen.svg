<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- 6 spokes radiating from center -->
  <!-- Spoke 0° (up) -->
  <line x1="50" y1="42" x2="50" y2="16" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Spoke 60° -->
  <line x1="57" y1="46" x2="77" y2="23" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Spoke 120° -->
  <line x1="57" y1="54" x2="77" y2="77" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Spoke 180° (down) -->
  <line x1="50" y1="58" x2="50" y2="84" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Spoke 240° -->
  <line x1="43" y1="54" x2="23" y2="77" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Spoke 300° -->
  <line x1="43" y1="46" x2="23" y2="23" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Branches on spoke 0° (up) -->
  <line x1="50" y1="29" x2="43" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="29" x2="57" y2="22" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branches on spoke 180° (down) -->
  <line x1="50" y1="71" x2="43" y2="78" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="71" x2="57" y2="78" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branches on spoke 60° -->
  <line x1="67" y1="35" x2="74" y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="67" y1="35" x2="76" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branches on spoke 240° -->
  <line x1="33" y1="65" x2="26" y2="73" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33" y1="65" x2="24" y2="62" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branches on spoke 120° -->
  <line x1="67" y1="65" x2="76" y2="62" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="67" y1="65" x2="74" y2="73" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Branches on spoke 300° -->
  <line x1="33" y1="35" x2="24" y2="38" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33" y1="35" x2="26" y2="27" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center circle (yellow) -->
  <circle cx="50" cy="50" r="6" fill="#F5C842"/>
</svg>
