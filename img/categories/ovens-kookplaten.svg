<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Main body -->
  <rect x="12" y="12" width="76" height="80" rx="5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cooktop / oven divider -->
  <line x1="12" y1="46" x2="88" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Burner top-left outer -->
  <circle cx="32" cy="30" r="9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Burner top-left inner (yellow) -->
  <circle cx="32" cy="30" r="5" stroke="#F5C842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Burner top-right outer -->
  <circle cx="68" cy="30" r="9" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Burner top-right inner (yellow) -->
  <circle cx="68" cy="30" r="5" stroke="#F5C842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Oven door -->
  <rect x="22" y="54" width="56" height="30" rx="4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  <!-- Oven window (yellow) -->
  <rect x="28" y="58" width="44" height="22" rx="3" stroke="#F5C842" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Oven handle -->
  <line x1="28" y1="56" x2="72" y2="56" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>
