<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Wrench head circle -->
  <circle cx="26" cy="26" r="14" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Wrench handle (white thick diagonal) -->
  <line x1="36" y1="36" x2="74" y2="74" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <!-- Hammer head (yellow, rotated) -->
  <rect x="58" y="14" width="22" height="14" rx="3" stroke="#F5C842" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="rotate(45 69 21)"/>
  <!-- Hammer handle (yellow diagonal) -->
  <line x1="76" y1="76" x2="40" y2="40" stroke="#F5C842" stroke-width="6" stroke-linecap="round"/>
</svg>
