<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="38" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Middle ring -->
  <circle cx="50" cy="50" r="26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Inner hub (yellow) -->
  <circle cx="50" cy="50" r="8" stroke="#F5C842" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Three drum perforations at 120° intervals (yellow fill) -->
  <circle cx="50" cy="33" r="3" fill="#F5C842"/>
  <circle cx="35.3" cy="58.5" r="3" fill="#F5C842"/>
  <circle cx="64.7" cy="58.5" r="3" fill="#F5C842"/>
</svg>
