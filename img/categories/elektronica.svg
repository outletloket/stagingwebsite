<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Screen body -->
  <rect x="12" y="14" width="76" height="56" rx="6" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Screen bezel inner -->
  <rect x="18" y="20" width="64" height="44" rx="3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.4"/>
  <!-- Stand neck -->
  <rect x="44" y="70" width="12" height="10" rx="2" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Stand base -->
  <rect x="30" y="80" width="40" height="6" rx="3" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Power dot (yellow) -->
  <circle cx="50" cy="67" r="2" fill="#F5C842"/>
</svg>
