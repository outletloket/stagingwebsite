<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Dome top (upper hemisphere) -->
  <path d="M18,50 A32,32 0 0,1 82,50" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Bowl bottom -->
  <path d="M18,50 Q20,64 50,66 Q80,64 82,50" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Lid knob (yellow) -->
  <circle cx="50" cy="22" r="4" fill="#F5C842"/>
  <!-- Lid meet line -->
  <line x1="22" y1="48" x2="78" y2="48" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,3"/>
  <!-- Three legs -->
  <line x1="34" y1="66" x2="22" y2="88" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="66" x2="50" y2="88" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="66" y1="66" x2="78" y2="88" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Cross support bar -->
  <line x1="26" y1="80" x2="74" y2="80" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
