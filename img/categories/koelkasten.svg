<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Main body -->
  <rect x="18" y="10" width="64" height="82" rx="6" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Freezer compartment divider -->
  <line x1="18" y1="36" x2="82" y2="36" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Upper door handle (yellow) -->
  <line x1="70" y1="18" x2="70" y2="30" stroke="#F5C842" stroke-width="4" stroke-linecap="round"/>
  <!-- Lower door handle (yellow) -->
  <line x1="70" y1="50" x2="70" y2="78" stroke="#F5C842" stroke-width="4" stroke-linecap="round"/>
  <!-- Fridge shelves (faint) -->
  <line x1="22" y1="56" x2="78" y2="56" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <line x1="22" y1="70" x2="78" y2="70" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
