<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#1a1a1a"/>
  <!-- Jar trapezoid -->
  <path d="M30,20 L70,20 L76,66 L24,66 Z" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Lid -->
  <rect x="35" y="12" width="30" height="9" rx="3" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Base -->
  <rect x="18" y="66" width="64" height="16" rx="4" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Yellow blade cross -->
  <line x1="34" y1="59" x2="66" y2="59" stroke="#F5C842" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="52" x2="50" y2="66" stroke="#F5C842" stroke-width="3" stroke-linecap="round"/>
  <!-- Power button (yellow) -->
  <circle cx="50" cy="74" r="3.5" fill="#F5C842"/>
</svg>
